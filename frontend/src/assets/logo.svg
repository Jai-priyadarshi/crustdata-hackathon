<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Outer ring arc -->
  <path d="M24 6 A18 18 0 0 1 42 24" stroke="url(#g2)" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.5"/>
  <path d="M24 6 A18 18 0 1 0 42 24" stroke="url(#g1)" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.2"/>

  <!-- Middle ring arc -->
  <path d="M24 12 A12 12 0 0 1 36 24" stroke="url(#g2)" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M24 12 A12 12 0 1 0 36 24" stroke="url(#g1)" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.25"/>

  <!-- Inner ring -->
  <circle cx="24" cy="24" r="6" stroke="url(#g2)" stroke-width="1.5" fill="none" opacity="0.7"/>

  <!-- Center dot -->
  <circle cx="24" cy="24" r="3" fill="url(#g1)"/>

  <!-- Rotating sweep group -->
  <g>
    <animateTransform attributeName="transform" type="rotate" values="0 24 24; 360 24 24" dur="3s" repeatCount="indefinite"/>
    <!-- Sweep line -->
    <line x1="24" y1="24" x2="38" y2="11" stroke="url(#g2)" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
    <!-- Dot at sweep tip -->
    <circle cx="38" cy="11" r="2" fill="#a78bfa" opacity="0.9"/>
    <!-- Trailing glow -->
    <line x1="24" y1="24" x2="38" y2="11" stroke="url(#g2)" stroke-width="6" stroke-linecap="round" opacity="0.08"/>
  </g>
</svg>
